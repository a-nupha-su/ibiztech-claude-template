# SonarQube / SonarCloud config — iBizTech template
# Setup: bash scripts/setup-sonar.sh  หรือแก้ค่าด้านล่างเอง
# Docs:  docs/17-sonar-setup.md

# === Project identity ===
sonar.projectKey=__PROJECT_KEY__
sonar.projectName=__PROJECT_NAME__
sonar.projectVersion=1.0
# sonar.organization=your-org-key      # (เปิดบรรทัดนี้ถ้าใช้ SonarCloud)

# === Sources / Tests ===
sonar.sources=src,apps
sonar.tests=tests,__tests__,src,apps
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.e2e.ts

# === Languages ===
sonar.sourceEncoding=UTF-8

# === Coverage reports (Jest/Vitest) ===
sonar.javascript.lcov.reportPaths=coverage/lcov.info,apps/*/coverage/lcov.info,packages/*/coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info,apps/*/coverage/lcov.info,packages/*/coverage/lcov.info

# === Exclusions (ไม่ scan) ===
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.next/**,\
  **/coverage/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/*.d.ts,\
  **/prisma/migrations/**,\
  **/public/**,\
  **/docs/**,\
  **/scripts/**,\
  **/.claude/**,\
  **/.github/**,\
  **/variants/**

sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.e2e.ts,\
  **/tests/**,\
  **/__tests__/**,\
  **/__mocks__/**

# === Duplications ===
sonar.cpd.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/prisma/**,\
  **/migrations/**

# === Quality gate ===
# ใช้ project's default gate ใน SonarQube — ตั้ง threshold ใน UI
sonar.qualitygate.wait=true
